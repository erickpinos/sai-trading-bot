<!-- Built-in strategies driven by the sai oracle price feed -->
<section class="panel" id="strategyEngine" data-collapsible>
  <div class="panel-head">
    <h2>Built-in strategies</h2>
    <span class="pill idle" id="seCount">0 running</span>
  </div>

  <p style="margin:8px 0 6px; color:var(--muted); font-size:10.5px">Polls the sai oracle for the selected market's spot price on a tick. When the indicator signals a state change the bot fires <code>openTrade</code> / <code>closeTrade</code> directly — no TradingView round-trip. Respects dry-run + kill switch.</p>

  <div class="form" style="margin:8px 0 4px">
    <div class="form-row">
      <label>strategy</label>
      <select id="seType"><option value="">loading…</option></select>
    </div>
    <div class="src-stat" id="seDesc" style="margin:-2px 0 6px; display:block; color:var(--dim); font-style:italic">—</div>
    <div class="form-row">
      <label>market</label>
      <select id="seMarket"><option value="">loading…</option></select>
    </div>
    <div class="form-row">
      <label>interval</label>
      <input id="seInterval" type="number" min="5" step="1" value="60" />
      <span class="meta">sec</span>
    </div>
    <div class="form-row">
      <label>leverage</label>
      <input id="seLev" type="number" min="1" step="1" value="2" />
    </div>
    <div class="form-row">
      <label>collateral</label>
      <input id="seAmt" type="number" min="0.01" step="0.01" value="5" />
      <span class="meta">USDC</span>
    </div>
    <div class="form-row">
      <label>slippage</label>
      <input id="seSlp" type="number" min="0.1" step="0.1" value="1" />
      <span class="meta">%</span>
    </div>
    <div id="seParams"></div>
  </div>

  <button class="btn" id="seStart" type="button" style="width:100%">start strategy</button>
  <div id="seError" class="warn" style="display:none; margin-top:8px"></div>

  <div style="margin-top:12px">
    <div class="field-label">→ running</div>
    <div id="seRunning"><div class="empty">none</div></div>
  </div>
</section>
