<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>sai-trading-bot</title>
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <header>
    <h1>
      <span id="modeDot" class="dot"></span>
      sai-trading-bot
    </h1>
    <span class="meta" id="meta">loading…</span>
    <div class="header-actions">
      <button class="btn theme-btn" id="themeBtn" type="button" title="toggle light/dark" aria-label="toggle theme">
        <svg class="icon icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="icon icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <div class="flow">

      <!-- ========== INPUTS ========== -->
      <div class="col">
        <div class="col-label">Inputs</div>
        <div data-include="/components/alert-builder/alert-builder.html"></div>
      </div>

      <!-- ========== PIPELINE ========== -->
      <div class="col">
        <div class="col-label">Pipeline</div>
        <div data-include="/components/pipeline-state/pipeline-state.html"></div>
        <div data-include="/components/controls/controls.html"></div>
        <div data-include="/components/activity-log/activity-log.html"></div>
      </div>

      <!-- ========== OUTPUTS ========== -->
      <div class="col">
        <div class="col-label">Outputs</div>
        <div data-include="/components/balance/balance.html"></div>
        <div data-include="/components/positions/positions.html"></div>
        <div data-include="/components/tx-history/tx-history.html"></div>
      </div>

    </div>
  </main>

  <div class="footer" id="footer">—</div>

  <script type="module" src="/js/core.js"></script>
</body>
</html>
